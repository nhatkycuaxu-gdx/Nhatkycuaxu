<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhật Ký Của Xù Xưa và Nay</title>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: Roboto, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #333; }
        .main-container { display: flex; flex-wrap: wrap; flex: 1; padding: 20px; gap: 20px; }
        .video-player { flex: 3; min-width: 300px; }
        .video-list { flex: 1; min-width: 300px; max-height: 80vh; overflow-y: auto; }
        iframe { width: 100%; aspect-ratio: 16/9; border-radius: 12px; }
        .item { display: flex; gap: 10px; margin-bottom: 15px; cursor: pointer; padding: 5px; border-radius: 8px; }
        .item:hover { background: #272727; }
        .item img { width: 120px; border-radius: 8px; }
    </style>
</head>
<body>
    <header>Nhật ký của Xù</header>
    <div class="main-container">
        <div class="video-player">
            <iframe id="player" src="https://www.youtube.com/embed/ p7hPGNWl1SA" frameborder="0" allowfullscreen></iframe>
            <h2 id="video-title">Tên video đangvphát</h2>
        </div>
        <div class="video-list" id="list">
            <div class="item" onclick="play(' p7hPGNWl1SA', 'Nhật ký của Xù_Tập 1 : Xù lớn có người yêu (Bản Gốc)[Kịch PhátThanh]')">
                <img src="https://img.youtube.com/vi/ID_VIDEO_1/0.jpg">
                <p>Nhật ký của Xù_Tập 1 : Xù lớn có người yêu (Bản Gốc)[Kịch PhátThanh]</p>
            </div>
            </div>
    </div>
    <script>
        function play(id, title) {
            document.getElementById('player').src = "https://www.youtube.com/embed/" + id;
            document.getElementById('video-title').innerText = title;
        }
    </script>
</body>
</html>
